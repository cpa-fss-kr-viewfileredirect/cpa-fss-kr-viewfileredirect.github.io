<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 사이트</title>
<style>
  /* 기본 여백 제거 및 배경색 설정 */
  body, html { 
    margin: 0; 
    padding: 0; 
    background-color: black; /* 배경색이 필요 없다면 white로 변경 가능 */
  }
  
  /* 이미지 모바일 최적화 및 스크롤 설정 */
  img { 
    width: 100%; /* 모바일 기기의 가로 너비에 화면 꽉 차게 맞춤 */
    height: auto; /* 원본 사진의 비율을 유지하며 세로 길이를 자동 조절하여 스크롤 생성 */
    display: block; /* 이미지 하단에 생기는 미세한 기본 공백 제거 */
  }
</style>
</head>
<body>
  <img src="1000015041.jpg" alt="메인 사진">
</body>
</html>
